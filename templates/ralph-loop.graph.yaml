id: ralph-loop
version: "1.0.0"
name: "Spec-Driven Development (Ralph Loop)"
description: "Define requirements, plan work, build iteratively, verify against acceptance criteria"
startNode: specify
strictContext: false

context:
  specComplete: false
  planComplete: false
  allTasksComplete: false
  testsPass: false
  acceptanceCriteriaMet: false

nodes:
  specify:
    type: action
    description: "Define requirements with acceptance criteria"
    instructions: |
      Work with the user to define what success looks like.
      Write clear, testable acceptance criteria.
      Each criterion should be specific and verifiable — not "works correctly"
      but "user can log in with Google and session persists across page reloads."
      Save specs to a specs/ directory or equivalent.
    returns:
      required:
        specComplete: { type: boolean }
    edges:
      - target: plan
        label: spec-ready

  plan:
    type: action
    description: "Create implementation plan with task breakdown"
    instructions: |
      Review the specs. Do a gap analysis against existing code.
      Break work into discrete tasks. For each task, derive required tests
      from the acceptance criteria.
      Output a prioritized task list — no implementation, no commits.
      Order tasks by dependency: foundations first, then features, then polish.
    returns:
      required:
        planComplete: { type: boolean }
        taskCount: { type: number }
    edges:
      - target: build
        label: plan-ready

  build:
    type: action
    maxTurns: 50
    description: "Pick a task, implement it, test it, commit it"
    instructions: |
      Pick the next incomplete task from the plan.
      Implement it. Write tests alongside — TDD when possible.
      Run tests. If they pass, commit.
      If they fail, fix and retry.
      Stay within the scope of this single task.
      Update context.completedTasks after each successful commit.
    returns:
      required:
        testsPass: { type: boolean }
    edges:
      - target: verify
        label: task-done
        condition: "context.allTasksComplete == true"
      - target: build
        label: next-task
        condition: "context.allTasksComplete == false"
        default: true

  verify:
    type: gate
    description: "Verify all acceptance criteria are met"
    instructions: |
      Run the full test suite.
      Check each acceptance criterion from the spec.
      Set context.acceptanceCriteriaMet based on results.
    validations:
      - expr: "context.testsPass == true"
        message: "All tests must pass."
      - expr: "context.acceptanceCriteriaMet == true"
        message: "All acceptance criteria must be met."
    edges:
      - target: complete
        label: verified
      - target: plan
        label: gaps-found
        condition: "context.acceptanceCriteriaMet == false"
        description: "Acceptance criteria not fully met, replan"

  complete:
    type: terminal
    description: "All work complete"
    instructions: |
      Summarize what was built:
      - Tasks completed
      - Tests passing
      - Acceptance criteria met
      - Any notes or follow-ups
