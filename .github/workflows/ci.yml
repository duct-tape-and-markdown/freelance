name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22, 24]

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - run: npm ci

      - run: npm run build

      - name: Test with coverage
        run: npm run test:coverage

      - name: Validate test fixtures
        run: node dist/bin.js validate ./test/fixtures-valid/

      - name: CLI smoke test
        run: |
          node dist/bin.js --help
          node dist/bin.js visualize ./test/fixtures-valid/valid-simple.workflow.yaml --format mermaid

      - name: Package dry-run
        run: npm pack --dry-run
