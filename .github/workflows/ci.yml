name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22, 24]

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - run: npm ci

      - run: npm run build

      - name: Test with coverage
        run: >-
          npx vitest run --coverage --coverage.reporter=text
          --coverage.thresholds.lines=90
          --coverage.exclude='src/index.ts'
          --coverage.exclude='src/proxy.ts'
          --coverage.exclude='src/daemon.ts'
          --coverage.exclude='src/**/index.ts'

      - name: Validate test fixtures
        run: node dist/index.js validate ./test/fixtures-valid/

      - name: CLI smoke test
        run: |
          node dist/index.js --help
          node dist/index.js visualize ./test/fixtures-valid/valid-simple.workflow.yaml --format mermaid

      - name: Package dry-run
        run: npm pack --dry-run
