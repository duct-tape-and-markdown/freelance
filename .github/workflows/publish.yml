name: Publish to npm

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - run: npm ci

      - run: npm run build

      - run: npm test

      # Pre-release GitHub Releases publish under the `beta` dist-tag so
      # `@latest` stays on the stable track. Promote to `latest` afterwards
      # with `npm dist-tag add freelance-mcp@<version> latest`.
      - name: Publish (stable)
        if: github.event.release.prerelease == false
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish (pre-release)
        if: github.event.release.prerelease == true
        run: npm publish --provenance --access public --tag beta
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
