id: bug-triage
version: "1.0.0"
name: "Bug Triage & Branch Targeting"
description: "Routes bug fixes to the correct branch based on who found the bug, timing relative to Tuesday cutdown, and priority. Implements the Branch Targeting Decision Tree from development-workflow.md."
startNode: classify-reporter
strictContext: false

context:
  ticketId: null
  bugType: null
  reporter: null
  isCritical: false
  isAfterCutdown: false
  forThisWeek: false
  targetBranch: null
  startBranch: null
  fixVersion: null
  component: null
  repository: null

nodes:
  classify-reporter:
    type: decision
    description: "Who found this bug / who needs this fix?"
    instructions: |
      Determine who reported or is affected by this bug:

      - 'production' — Live production customer
      - 'goearly' — GoEarly customer
      - 'qa' — QA team found it during testing
      - 'planned' — Planned feature or new development

      Set context.reporter to one of these values.
      Set context.ticketId to the Jira ticket key.
    edges:
      - target: production-priority
        label: production-customer
        condition: "context.reporter == 'production'"
        description: "Live production customer"
      - target: resolve-goearly
        label: goearly-customer
        condition: "context.reporter == 'goearly'"
        description: "GoEarly customer"
      - target: resolve-qa
        label: qa-found
        condition: "context.reporter == 'qa'"
        description: "QA team found it"
      - target: resolve-planned
        label: planned-work
        condition: "context.reporter == 'planned'"
        description: "Planned feature or new development"

  production-priority:
    type: decision
    description: "Is this a critical hotpatch?"
    instructions: |
      Evaluate severity:
      - Is this critical enough to require a hotpatch (off-cadence deployment)?
      - Set context.isCritical = true if yes.

      Set context.bugType = 'Bug' (live production issues are always type Bug).
      Set context.startBranch = 'main' (production bugs always start from main).
    edges:
      - target: resolve-hotpatch
        label: critical
        condition: "context.isCritical == true"
        description: "Critical — needs hotpatch to main"
      - target: production-timing
        label: regular
        description: "Regular production fix — timing determines target"

  production-timing:
    type: decision
    description: "Is it before or after Tuesday ~1:30 PM PT cutdown?"
    instructions: |
      The Tuesday cutdown shifts what 'weekly' and 'main' represent.

      - Before Tuesday ~1:30 PM PT: weekly branch accepts fixes for this week
      - After cutdown: weekly is frozen, main is the only path for this week

      Set context.isAfterCutdown = true if after cutdown.
    edges:
      - target: resolve-weekly
        label: before-cutdown
        condition: "context.isAfterCutdown == false"
        description: "Before cutdown → target weekly"
      - target: post-cutdown-decision
        label: after-cutdown
        condition: "context.isAfterCutdown == true"
        description: "After cutdown — main or next weekly?"

  post-cutdown-decision:
    type: decision
    description: "For this week's release or next week's?"
    instructions: |
      After Tuesday cutdown:
      - If the fix must go out THIS week → target main
      - If it can wait until NEXT week → target weekly (next cycle)

      Set context.forThisWeek = true if it must ship this week.
    edges:
      - target: resolve-main-weekly
        label: this-week
        condition: "context.forThisWeek == true"
        description: "Must ship this week → main"
      - target: resolve-weekly
        label: next-week
        description: "Can wait → next weekly cycle"

  resolve-hotpatch:
    type: action
    description: "Route: main (hotpatch)"
    instructions: |
      Critical hotpatch. Route directly to main.

      Set context.targetBranch = 'main'
      Set context.startBranch = 'main'

      Fix version should use .H suffix (e.g., 26.02.10.H).
      Retrieve active fix versions:
        acli jira project view --key DEV --json
    edges:
      - target: set-fix-version
        label: branch-set

  resolve-main-weekly:
    type: action
    description: "Route: main (late-week weekly delivery)"
    instructions: |
      After Tuesday cutdown, targeting this week's release.

      Set context.targetBranch = 'main'
      Set context.startBranch = 'main'

      Fix version uses no suffix (weekly format, nearest Sunday date).
    edges:
      - target: set-fix-version
        label: branch-set

  resolve-weekly:
    type: action
    description: "Route: weekly"
    instructions: |
      Standard production bug fix targeting weekly branch.

      Set context.targetBranch = 'weekly'
      Set context.startBranch = 'main'
      (Start from main to keep the fix independent of other weekly changes)

      Fix version uses no suffix (nearest Sunday date).
    edges:
      - target: set-fix-version
        label: branch-set

  resolve-goearly:
    type: action
    description: "Route: release"
    instructions: |
      GoEarly customer bug. Work starts from and targets release.

      Set context.bugType = 'Early Bug'
      Set context.targetBranch = 'release'
      Set context.startBranch = 'release'

      Fix version uses .R-# suffix.
      Note: Early bugs have a short accuracy window — unfixed when releases
      cut down, they become live bugs.
    edges:
      - target: set-fix-version
        label: branch-set

  resolve-qa:
    type: action
    description: "Route: monthly"
    instructions: |
      QA-found prerelease bug. Work starts from and targets monthly.

      Set context.bugType = 'Prerelease Bug'
      Set context.targetBranch = 'monthly'
      Set context.startBranch = 'monthly'

      Fix version uses .M suffix.
    edges:
      - target: set-fix-version
        label: branch-set

  resolve-planned:
    type: action
    description: "Route: monthly (or feature branch)"
    instructions: |
      Planned feature or new development.

      If part of a multi-ticket feature, use a feature branch targeting monthly.
      If standalone, target monthly directly.

      Set context.targetBranch = 'monthly' (or 'feature/<name>')
      Set context.startBranch = 'monthly'

      Do NOT set a fix version for feature branches.
      For direct monthly targets, fix version uses .M suffix.
    edges:
      - target: set-fix-version
        label: branch-set

  set-fix-version:
    type: action
    description: "Retrieve and set the fix version"
    instructions: |
      Retrieve active fix versions from DEV project:
        acli jira project view --key DEV --json

      Filter to unreleased, unarchived versions.
      Match the suffix to context.targetBranch:
      - weekly/main (weekly): no suffix, nearest Sunday
      - monthly: .M suffix
      - release: .R-# suffix
      - main (hotpatch): .H suffix
      - main (non-releasing repo): No-Release

      Set context.fixVersion to the matched version name.
      Set context.component and context.repository if known.
    edges:
      - target: verify-routing
        label: version-set

  verify-routing:
    type: gate
    description: "Verify branch targeting is complete"
    instructions: |
      Confirm all routing decisions are set before proceeding to implementation.
    validations:
      - expr: "context.targetBranch != null"
        message: "Target branch must be determined."
      - expr: "context.startBranch != null"
        message: "Start branch must be determined."
    edges:
      - target: done
        label: routing-complete

  done:
    type: terminal
    description: "Triage complete — ready for implementation"
    instructions: |
      Bug has been triaged and routed:
      - Ticket: context.ticketId
      - Target branch: context.targetBranch
      - Start branch: context.startBranch
      - Fix version: context.fixVersion
      - Bug type: context.bugType

      Create the working branch from context.startBranch and begin
      the commit-to-push workflow.
