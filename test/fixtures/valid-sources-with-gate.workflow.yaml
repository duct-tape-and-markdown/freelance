id: valid-sources-with-gate
version: "1.0.0"
name: "Sources With Gate"
description: "Graph with sources and a validation gate for error response testing"
startNode: start

sources:
  - path: "docs/ambient-guide.md"
    hash: "a1b2c3d4e5f60011"

context:
  approved: false

nodes:
  start:
    type: gate
    description: "Gate that requires approval"
    validations:
      - expr: "context.approved == true"
        message: "Must be approved before advancing."
    edges:
      - target: done
        label: proceed

  done:
    type: terminal
    description: "Complete"
