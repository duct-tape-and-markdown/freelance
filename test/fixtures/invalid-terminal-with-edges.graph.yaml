id: invalid-terminal-with-edges
version: "1.0.0"
name: "Invalid Terminal With Edges"
description: "A terminal node that has outgoing edges"
startNode: start

nodes:
  start:
    type: action
    description: "Start node"
    edges:
      - target: done
        label: finish

  done:
    type: terminal
    description: "Terminal node with illegal edges"
    edges:
      - target: start
        label: loop-back
